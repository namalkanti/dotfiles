# Tell tmux to use 256-color internally
set -g default-terminal "xterm-256color"
# Allow tmux to send 256-color to its "parent terminal", allowing
# the terminal to render colors in full.
set-option -ga terminal-overrides ",*256color*:Tc"
set-option -g default-shell /bin/zsh

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 2

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Changing prefix and command line
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix
bind \; command-prompt
bind Q choose-client -Z

# Altering indexing 
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Creating panes
bind t new-window -c "#{pane_current_path}"
bind L split-window -h -c "#{pane_current_path}"
bind J split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switching panes
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# Resizing panes
bind W resize-pane -U 15
bind S resize-pane -D 15
bind A resize-pane -L 15
bind D resize-pane -R 15

# Switching tabs
bind N previous-window
bind n next-window

# Moving windows/panes
bind T break-pane
bind c choose-window 'join-pane -h -s "%%"'
bind C choose-window 'join-pane -s "%%"'
bind M choose-tree -s "move-window -t '%%'"

# Copy mode
bind v copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tr '\n' ' ' | pbcopy"
bind p paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tr '\n' ' ' | pbcopy"

# Status line
setw -g window-status-current-style bg=blue
setw -g monitor-activity on
set -g visual-activity on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'erikw/tmux-powerline'

# Auto-restore last saved session when tmux starts
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
